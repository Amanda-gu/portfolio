backend:
  name: github
  repo: Amanda-gu/portfolio
  branch: main
  base_url: https://sveltia-cms-auth.guoj826.workers.dev

site_url: https://amanda-gu.github.io/portfolio

media_folder: assets
public_folder: assets

collections:
  - name: projects
    label: Projects
    label_singular: Project
    files:
      - name: projects
        label: Projects List
        file: content/projects.json
        fields:
          - name: projects
            label: Projects
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: id, label: ID (slug), widget: string }
              - { name: url, label: URL path, widget: string, required: false }
              - name: tags
                label: Tags
                widget: list
                field: { name: tag, label: Tag, widget: string }
              - name: image
                label: Image
                widget: image
                required: false
              - name: gallery
                label: Gallery (max 10)
                label_singular: Image
                widget: list
                max: 10
                required: false
                fields:
                  - { name: src, label: Image, widget: image }
                  - { name: caption, label: Caption, widget: string, required: false }
                  - name: layout
                    label: Layout
                    widget: select
                    options: [full, beside-right, beside-left, offset, overlay]
                    default: full
