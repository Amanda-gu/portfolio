backend:
  name: github
  repo: Amanda-gu/portfolio
  branch: main
  base_url: https://sveltia-cms-auth.guoj826.workers.dev

media_folder: assets
public_folder: assets

collections:
  - name: projects
    label: Projects
    label_singular: Project
    files:
      - name: projects
        label: Projects List
        file: content/projects.json
        fields:
          - name: projects
            label: Projects
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: id, label: ID (slug), widget: string }
              - { name: url, label: URL path, widget: string }
              - name: tags
                label: Tags
                widget: list
                field: { name: tag, label: Tag, widget: string }
              - name: image
                label: Image
                widget: image
                required: false
